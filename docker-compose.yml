version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: minio_coffee
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: miniocoffee
      MINIO_ROOT_PASSWORD: miniocoffee123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
volumes:
  minio-data:
